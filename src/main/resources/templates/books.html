<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог книг — LibraryOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">📚 LibraryOS</a>
    <div class="nav-controls">
        <a href="/" class="nav-link">Главная</a>
        <a href="/dashboard" class="nav-link">Статистика</a>
        <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
    </div>
</nav>

<div class="container">
    <a href="/" class="back-nav">← Главная</a>
    <div class="toolbar">
        <h1 class="section-title" style="margin:0;">Книжный фонд</h1>
        <form action="/books" method="get" class="search-form">
            <input type="text" name="query" th:value="${query}" placeholder="Поиск по названию…" aria-label="Поиск">
            <button type="submit" class="btn btn-primary">Найти</button>
        </form>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>ISBN</th>
                <th>Год</th>
                <th>Издатель</th>
                <th>Язык</th>
                <th>Стр.</th>
                <th>Всего</th>
                <th>Доступно</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.bookId}">1</td>
                <td style="font-weight:600;" th:text="${book.title}">Title</td>
                <td style="font-family:monospace;font-size:0.85rem;" th:text="${book.isbn}">ISBN</td>
                <td th:text="${book.publishYear}">Year</td>
                <td th:text="${book.publisher}">Publisher</td>
                <td th:text="${book.language}">Lang</td>
                <td th:text="${book.pages}">Pages</td>
                <td><span class="badge" th:text="${book.totalCopies}">0</span></td>
                <td>
                    <span th:if="${book.availableCopies > 0}" class="badge badge-success"
                          th:text="${book.availableCopies}">0</span>
                    <span th:unless="${book.availableCopies > 0}" class="badge badge-warn">0</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="9" style="text-align:center;padding:2rem;opacity:0.7;">Книги не найдены</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/books(query=${query},page=${currentPage - 1})}">«</a>
        <span class="current" th:text="${currentPage + 1} + ' / ' + ${totalPages}">1 / 1</span>
        <a th:if="${currentPage + 1 < totalPages}"
           th:href="@{/books(query=${query},page=${currentPage + 1})}">»</a>
    </div>
</div>

<footer>&copy; 2026 LibraryOS</footer>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
