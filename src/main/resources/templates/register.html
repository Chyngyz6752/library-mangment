<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — LibraryOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">📚 LibraryOS</a>
    <div class="nav-controls">
        <a href="/" class="nav-link">Главная</a>
        <a href="/books" class="nav-link">Каталог</a>
        <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
    </div>
</nav>

<div class="container">
    <a href="/" class="back-nav">← Главная</a>
    <div class="form-card">
        <h1>Новый читатель</h1>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="firstName">Имя</label>
                <input type="text" id="firstName" name="firstName" required maxlength="100" placeholder="Иван">
            </div>
            <div class="form-group">
                <label for="lastName">Фамилия</label>
                <input type="text" id="lastName" name="lastName" required maxlength="100" placeholder="Иванов">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="ivan@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00">
            </div>
            <div class="form-group">
                <label for="address">Адрес</label>
                <input type="text" id="address" name="address" maxlength="500" placeholder="г. Москва, ул. Ленина, 1">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>
        <div id="message" class="alert"></div>
    </div>
</div>

<footer>&copy; 2026 LibraryOS</footer>

<script th:src="@{/js/theme.js}"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        messageDiv.className = 'alert';
        messageDiv.textContent = '';

        const formData = {
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim() || null,
            address: document.getElementById('address').value.trim() || null
        };

        try {
            const response = await fetch('/api/members', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const result = await response.json();
                messageDiv.textContent = 'Успешно! ID читателя: ' + result.memberId;
                messageDiv.classList.add('success');
                document.getElementById('registerForm').reset();
            } else {
                const errorData = await response.json().catch(() => ({}));
                let msg = errorData.message || 'Не удалось создать читателя';
                if (errorData.validationErrors) {
                    msg += ': ' + Object.entries(errorData.validationErrors)
                        .map(([k, v]) => k + ' — ' + v).join('; ');
                }
                messageDiv.textContent = msg;
                messageDiv.classList.add('error');
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.textContent = 'Ошибка сети';
            messageDiv.classList.add('error');
        }
    });
</script>
</body>
</html>
