<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Colors */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-bg: #e5e7eb;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            /* Dark Theme Colors */
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --text-color: #f9fafb;
            --card-bg: rgba(31, 41, 55, 0.9);
            --primary-color: #818cf8;
            --primary-hover: #6366f1;
            --secondary-bg: #374151;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-color);
            margin: 0;
            transition: background-image 0.5s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Navbar */
        .navbar {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lang-select {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--secondary-bg);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-family: inherit;
            cursor: pointer;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-color);
            transition: transform 0.3s;
        }
        .theme-toggle:hover { transform: rotate(15deg); }

        /* Form Card */
        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(5px);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease-out;
            margin-top: 80px; /* Offset for fixed navbar */
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--primary-color), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--secondary-bg);
            border-radius: 8px;
            font-size: 1rem;
            background-color: var(--card-bg); /* Input matches card but slightly different */
            color: var(--text-color);
            transition: var(--transition);
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Back Button Style */
        .back-nav {
            display: inline-flex;
            align-items: center;
            color: var(--text-color);
            background-color: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: var(--transition);
            font-size: 0.9rem;
            box-shadow: var(--shadow);
        }
        .back-nav:hover {
            transform: translateX(-5px);
            background-color: var(--primary-color);
            color: white;
        }

        /* Messages */
        #message {
            margin-top: 1rem;
            text-align: center;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">📚 LibraryOS</a>
        <div class="nav-controls">
            <select id="langSelect" class="lang-select">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="kg">Кыргызча</option>
            </select>
            <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
        </div>
    </nav>

    <div class="card">
        <!-- Кнопка Назад Сверху -->
        <a href="/" class="back-nav" data-i18n="back">← На Главную</a>

        <h1 data-i18n="newReader">Новый Читатель</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="firstName" data-i18n="firstName">Имя</label>
                <input type="text" id="firstName" name="firstName" required placeholder="Иван">
            </div>
            <div class="form-group">
                <label for="lastName" data-i18n="lastName">Фамилия</label>
                <input type="text" id="lastName" name="lastName" required placeholder="Иванов">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="ivan@example.com">
            </div>
            <div class="form-group">
                <label for="phone" data-i18n="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00">
            </div>
            <div class="form-group">
                <label for="address" data-i18n="address">Адрес</label>
                <input type="text" id="address" name="address" placeholder="г. Москва, ул. Ленина, 1">
            </div>
            <button type="submit" class="btn" data-i18n="registerBtn">Зарегистрироваться</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // Translations
        const translations = {
            ru: {
                newReader: "Новый Читатель",
                firstName: "Имя",
                lastName: "Фамилия",
                phone: "Телефон",
                address: "Адрес",
                registerBtn: "Зарегистрироваться",
                back: "← На Главную"
            },
            en: {
                newReader: "New Reader",
                firstName: "First Name",
                lastName: "Last Name",
                phone: "Phone",
                address: "Address",
                registerBtn: "Register",
                back: "← Back to Home"
            },
            kg: {
                newReader: "Жаңы Окурман",
                firstName: "Аты",
                lastName: "Фамилиясы",
                phone: "Телефон",
                address: "Дареги",
                registerBtn: "Катталуу",
                back: "← Башкы бетке кайтуу"
            }
        };

        // Language Logic
        const langSelect = document.getElementById('langSelect');

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
            localStorage.setItem('lang', lang);
            langSelect.value = lang;
        }

        langSelect.addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });

        // Initialize Language
        const savedLang = localStorage.getItem('lang') || 'ru';
        setLanguage(savedLang);

        // Dark Mode Logic (Shared)
        const toggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            body.setAttribute('data-theme', currentTheme);
            toggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        }

        toggleBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleBtn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.textContent = '☀️';
            }
        });

        // Form Logic
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/members', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const result = await response.json();
                    messageDiv.textContent = 'Успешно! ID читателя: ' + result.memberId;
                    messageDiv.className = 'success';
                    messageDiv.style.display = 'block';
                    document.getElementById('registerForm').reset();
                } else {
                    const errorData = await response.json();
                    messageDiv.textContent = 'Ошибка: ' + (errorData.message || 'Не удалось создать');
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.textContent = 'Ошибка сети';
                messageDiv.className = 'error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
