# Server
server.port=${SERVER_PORT:8080}

# Database (PostgreSQL) - override via env vars in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/library_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
# "update" keeps data between restarts; in real prod: "validate" + Flyway migrations
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Data initialization runs in Java (DataLoader)
spring.sql.init.mode=never

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.example.library.controller

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Library business rules
library.loan.duration-days=${LOAN_DURATION_DAYS:14}
library.loan.fine-per-day=${LOAN_FINE_PER_DAY:0.50}

# Jackson
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# Security (dev defaults; override in prod)
app.security.admin-username=${ADMIN_USERNAME:admin}
app.security.admin-password=${ADMIN_PASSWORD:admin}

# Scheduling
spring.task.scheduling.pool.size=2
